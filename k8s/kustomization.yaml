apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Common labels applied to all resources
commonLabels:
  app: curriculum-forge
  version: v1

# Resources to deploy
resources:
- pvc.yaml
- configmap.yaml
- deployment.yaml
- service.yaml
- ingress.yaml

# Configurations
configMapGenerator:
# Override default config if needed
- name: curriculum-forge-config
  behavior: merge
  literals:
  - log_level=INFO

# Image tags (customize for your registry)
images:
- name: curriculum-forge-gateway
  newTag: latest
- name: curriculum-forge-ui
  newTag: latest

# Patches (uncomment to customize)
# patchesStrategicMerge:
# - patches/replicas.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: curriculum-forge-ingress
  labels:
    app: curriculum-forge
  annotations:
    # Nginx Ingress annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    # SSE support - disable buffering
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400s"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400s"
    
    # CORS (if needed)
    # nginx.ingress.kubernetes.io/enable-cors: "true"
    # nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - forge.example.com
    secretName: curriculum-forge-tls
  rules:
  # Main UI - serves frontend
  - host: forge.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: curriculum-forge-ui
            port:
              number: 80
  
  # API endpoints - proxy to gateway
  - host: api.forge.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: curriculum-forge-gateway
            port:
              number: 8765
---
# Alternative: Single host with path-based routing
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: curriculum-forge-ingress-unified
  labels:
    app: curriculum-forge
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400s"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - forge.example.com
    secretName: curriculum-forge-tls
  rules:
  - host: forge.example.com
    http:
      paths:
      # API routes
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: curriculum-forge-gateway
            port:
              number: 8765
      # SSE routes (no /api prefix)
      - path: /coordinator/events
        pathType: Exact
        backend:
          service:
            name: curriculum-forge-gateway
            port:
              number: 8765
      - path: /acp
        pathType: Prefix
        backend:
          service:
            name: curriculum-forge-gateway
            port:
              number: 8765
      - path: /jobs
        pathType: Prefix
        backend:
          service:
            name: curriculum-forge-gateway
            port:
              number: 8765
      # UI fallback
      - path: /
        pathType: Prefix
        backend:
          service:
            name: curriculum-forge-ui
            port:
              number: 80

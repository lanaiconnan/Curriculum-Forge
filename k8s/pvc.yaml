apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: curriculum-forge-checkpoints
  labels:
    app: curriculum-forge
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard  # Uncomment and adjust for your cluster
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: curriculum-forge-templates
  labels:
    app: curriculum-forge
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # storageClassName: standard  # Uncomment and adjust for your cluster

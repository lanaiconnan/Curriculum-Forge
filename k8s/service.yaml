apiVersion: v1
kind: Service
metadata:
  name: curriculum-forge-gateway
  labels:
    app: curriculum-forge
    component: gateway
spec:
  type: ClusterIP
  ports:
  - port: 8765
    targetPort: 8765
    protocol: TCP
    name: http
  selector:
    app: curriculum-forge
    component: gateway
---
apiVersion: v1
kind: Service
metadata:
  name: curriculum-forge-ui
  labels:
    app: curriculum-forge
    component: ui
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: curriculum-forge
    component: ui
---
# Optional: NodePort for direct access without Ingress
apiVersion: v1
kind: Service
metadata:
  name: curriculum-forge-gateway-nodeport
  labels:
    app: curriculum-forge
    component: gateway
spec:
  type: NodePort
  ports:
  - port: 8765
    targetPort: 8765
    nodePort: 30876  # 30000-32767 range
    protocol: TCP
    name: http
  selector:
    app: curriculum-forge
    component: gateway

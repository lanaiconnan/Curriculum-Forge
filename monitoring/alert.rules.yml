groups:
  - name: curriculum_forge_alerts
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} requests/s over the last 5 minutes"

      # Gateway down
      - alert: GatewayDown
        expr: up{job="curriculum-forge-gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Curriculum-Forge Gateway is down"
          description: "Gateway instance {{ $labels.instance }} is unreachable"

      # High latency
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "95th percentile latency is {{ $value }}s"

      # Job failure rate
      - alert: HighJobFailureRate
        expr: rate(jobs_completed_total{state="FAILED"}[15m]) / rate(jobs_completed_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High job failure rate"
          description: "{{ $value | humanizePercentage }} of jobs are failing"

      # No active agents
      - alert: NoActiveAgents
        expr: acp_agents_registered == 0
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "No active ACP agents"
          description: "No agents are currently registered"

      # SSE connection limit
      - alert: HighSSEConnections
        expr: sse_connections_active > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of SSE connections"
          description: "{{ $value }} active SSE connections"

      # Cache hit rate low
      - alert: LowCacheHitRate
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.5
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }}"

  # ============================================================
  # Governance Layer Alerts
  # ============================================================
  - name: governance_alerts
    interval: 30s
    rules:
      # No registered agents in Keeper
      - alert: NoRegisteredAgents
        expr: sum(keeper_agents_registered) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No agents registered in Keeper"
          description: "No agents are available for task assignment"

      # High unhealthy agents
      - alert: HighUnhealthyAgents
        expr: keeper_agents_unhealthy > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of unhealthy agents"
          description: "{{ $value }} agents are unhealthy"

      # Task assignment failures
      - alert: HighTaskRejectionRate
        expr: rate(keeper_tasks_rejected_total[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High task rejection rate"
          description: "Task rejection rate is {{ $value }}/s"

      # Agent banned
      - alert: AgentBanned
        expr: mayor_agents_banned > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Agent(s) have been banned"
          description: "{{ $value }} agent(s) have reputation below ban threshold"

      # High rule violation rate
      - alert: HighViolationRate
        expr: sum(rate(mayor_rule_violations_total[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High rule violation rate"
          description: "Rule violations occurring at {{ $value }}/s"

      # Request queue backlog
      - alert: RequestQueueBacklog
        expr: sum(frontdesk_requests_in_queue) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Request queue backlog"
          description: "{{ $value }} requests waiting in queue"

      # High request failure rate
      - alert: HighRequestFailureRate
        expr: sum(rate(frontdesk_requests_completed_total{status="failed"}[5m])) / sum(rate(frontdesk_requests_completed_total[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High request failure rate"
          description: "{{ $value | humanizePercentage }} of requests are failing"

      # Long request processing time
      - alert: LongRequestProcessing
        expr: histogram_quantile(0.95, sum(rate(frontdesk_request_duration_seconds_bucket[5m])) by (le)) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Long request processing time"
          description: "95th percentile request duration is {{ $value }}s""

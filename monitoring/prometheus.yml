global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'curriculum-forge'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Curriculum-Forge Gateway
  - job_name: 'curriculum-forge-gateway'
    static_configs:
      - targets: ['gateway:8765']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node exporter (optional - for host metrics)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
